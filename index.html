<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a1a">
    <title>Repretel TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a1a;
            min-height: 100dvh;
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 16px 20px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-left h1 {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(90deg, #ff4757, #ff6348);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-left .live-dot {
            width: 8px;
            height: 8px;
            background: #ff4757;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .cast-btn-native {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0;
        }
        .cast-btn-native:active {
            background: rgba(255,255,255,0.15);
            transform: scale(0.92);
        }
        .cast-btn-native svg {
            width: 22px;
            height: 22px;
            fill: white;
        }
        .cast-btn-native.connected svg {
            fill: #2ed573;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            flex-shrink: 0;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .video-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%);
        }
        .video-overlay .big-play {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .video-overlay .big-play:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.25);
        }
        .video-overlay p {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 16px 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .video-container:hover .video-controls,
        .video-container.touched .video-controls {
            opacity: 1;
            pointer-events: all;
        }
        .ctrl-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .ctrl-btn:active {
            background: rgba(255,255,255,0.3);
        }
        .progress-bar {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: #ff4757;
            border-radius: 2px;
            transition: width 0.3s;
        }
        .channels-section {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 12px;
            padding-left: 4px;
        }
        .channel-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-appearance: none;
            border: none;
            width: 100%;
            text-align: left;
            color: white;
        }
        .channel-item:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.08);
        }
        .channel-item.active {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
        .channel-item .ch-logo {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            flex-shrink: 0;
            position: relative;
        }
        .ch-logo .playing-indicator {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            background: #2ed573;
            border-radius: 50%;
            border: 2px solid #0a0a1a;
            display: none;
        }
        .channel-item.active .playing-indicator {
            display: block;
        }
        .c6-logo { background: linear-gradient(135deg, #ff4757, #ff6348); }
        .c11-logo { background: linear-gradient(135deg, #ffa502, #ff7f50); }
        .c4-logo { background: linear-gradient(135deg, #2ed573, #1e90ff); }
        .channel-item .ch-info {
            flex: 1;
        }
        .channel-item .ch-info .ch-name {
            font-size: 1.05rem;
            font-weight: 700;
            display: block;
        }
        .channel-item .ch-info .ch-desc {
            font-size: 0.8rem;
            color: #888;
            display: block;
            margin-top: 2px;
        }
        .channel-item .ch-arrow {
            font-size: 1.2rem;
            color: #555;
            transition: transform 0.2s;
        }
        .channel-item.active .ch-arrow {
            transform: translateX(4px);
            color: #ff4757;
        }
        .bottom-info {
            padding: 12px 20px 24px;
            text-align: center;
            flex-shrink: 0;
        }
        .bottom-info p {
            font-size: 0.75rem;
            color: #444;
        }
        .bottom-info .cast-hint {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.06);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 8px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="live-dot"></div>
            <h1>Repretel</h1>
        </div>
        <button class="cast-btn-native" id="castBtn" title="Transmitir a TV">
            <svg viewBox="0 0 24 24">
                <path d="M2 16.1C2.58 16.1 3.05 16.58 3.05 17.15V19.9C3.05 20.48 2.58 20.95 2 20.95C1.42 20.95 0.95 20.48 0.95 19.9V17.15C0.95 16.58 1.42 16.1 2 16.1ZM6.5 14.55C6.5 15.13 6.03 15.6 5.45 15.6C4.88 15.6 4.4 15.13 4.4 14.55V19.9C4.4 20.48 4.88 20.95 5.45 20.95C6.03 20.95 6.5 20.48 6.5 19.9V14.55ZM9.35 12.35C9.35 12.93 8.88 13.4 8.3 13.4C7.73 13.4 7.25 12.93 7.25 12.35V19.9C7.25 20.48 7.73 20.95 8.3 20.95C8.88 20.95 9.35 20.48 9.35 19.9V12.35ZM21 3H3C1.9 3 1 3.9 1 5V8.75H3V5.1C3 5.04 3.04 5 3.1 5H20.9C20.96 5 21 5.04 21 5.1V18.9C21 18.96 20.96 19 20.9 19H15.25V21H21C22.1 21 23 20.1 23 19V5C23 3.9 22.1 3 21 3Z"/>
            </svg>
        </button>
    </div>

    <div class="video-container" id="videoContainer">
        <div class="video-overlay" id="videoOverlay">
            <div class="big-play" id="bigPlayBtn">▶️</div>
            <p>Tocá para reproducir</p>
        </div>
        <video id="player" playsinline webkit-playsinline preload="none"></video>
        <div class="video-controls" id="videoControls">
            <button class="ctrl-btn" id="playPauseBtn">▶️</button>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <button class="ctrl-btn" id="fullscreenBtn">⛶</button>
        </div>
    </div>

    <div class="channels-section">
        <div class="section-title">Canales en vivo</div>

        <button class="channel-item" data-url="https://alba-cr-repretel-c6.stream.mediatiquestream.com/index.m3u8" data-name="Canal 6">
            <div class="ch-logo c6-logo">
                6
                <div class="playing-indicator"></div>
            </div>
            <div class="ch-info">
                <span class="ch-name">Canal 6</span>
                <span class="ch-desc">Noticias, deportes y actualidad</span>
            </div>
            <span class="ch-arrow">›</span>
        </button>

        <button class="channel-item" data-url="https://alba-cr-repretel-c11.stream.mediatiquestream.com/index.m3u8" data-name="Canal 11">
            <div class="ch-logo c11-logo">
                11
                <div class="playing-indicator"></div>
            </div>
            <div class="ch-info">
                <span class="ch-name">Canal 11</span>
                <span class="ch-desc">Series, películas y juvenil</span>
            </div>
            <span class="ch-arrow">›</span>
        </button>

        <button class="channel-item" data-url="https://alba-cr-repretel-c4.stream.mediatiquestream.com/index.m3u8" data-name="Canal 4">
            <div class="ch-logo c4-logo">
                4
                <div class="playing-indicator"></div>
            </div>
            <div class="ch-info">
                <span class="ch-name">Canal 4</span>
                <span class="ch-desc">Cultura, local y comunidad</span>
            </div>
            <span class="ch-arrow">›</span>
        </button>
    </div>

    <div class="bottom-info">
        <p>Costa Rica • Transmisión en vivo</p>
        <div class="cast-hint">
            <span>📡</span>
            <span>Tocá el ícono arriba para enviar a TV</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <script>
        const player = document.getElementById('player');
        const videoOverlay = document.getElementById('videoOverlay');
        const bigPlayBtn = document.getElementById('bigPlayBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const videoControls = document.getElementById('videoControls');
        const videoContainer = document.getElementById('videoContainer');
        const progressFill = document.getElementById('progressFill');
        const castBtn = document.getElementById('castBtn');
        const channelItems = document.querySelectorAll('.channel-item');

        let hls = null;
        let currentUrl = null;
        let isPlaying = false;
        let castSession = null;
        let isCasting = false;

        // ========== REPRODUCTOR ==========
        function loadChannel(url, name) {
            currentUrl = url;

            // Destruir HLS anterior
            if (hls) {
                hls.destroy();
                hls = null;
            }

            // Si está en modo Cast, cargar en Chromecast
            if (isCasting && castSession) {
                loadMediaOnCast(url, name);
                return;
            }

            // Cargar en reproductor local
            videoOverlay.classList.add('hidden');

            if (Hls.isSupported()) {
                hls = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 30
                });
                hls.loadSource(url);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    player.play();
                    isPlaying = true;
                    updatePlayButton();
                });
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = url;
                player.addEventListener('loadedmetadata', () => {
                    player.play();
                    isPlaying = true;
                    updatePlayButton();
                }, { once: true });
            }
        }

        function togglePlay() {
            if (isCasting && castSession) {
                const media = castSession.getMediaSession();
                if (media) {
                    if (media.playerState === 'PLAYING') {
                        media.pause();
                    } else {
                        media.play();
                    }
                }
                return;
            }

            if (player.paused) {
                player.play();
                isPlaying = true;
            } else {
                player.pause();
                isPlaying = false;
            }
            updatePlayButton();
        }

        function updatePlayButton() {
            const icon = isPlaying ? '⏸️' : '▶️';
            playPauseBtn.textContent = icon;
            bigPlayBtn.textContent = icon;
        }

        // ========== CONTROLES ==========
        bigPlayBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!currentUrl) {
                // Si no hay canal seleccionado, seleccionar el primero
                channelItems[0].click();
            } else {
                togglePlay();
            }
        });

        playPauseBtn.addEventListener('click', togglePlay);

        player.addEventListener('play', () => { isPlaying = true; updatePlayButton(); });
        player.addEventListener('pause', () => { isPlaying = false; updatePlayButton(); });

        // Mostrar controles al tocar video
        let controlsTimeout;
        videoContainer.addEventListener('click', () => {
            videoContainer.classList.add('touched');
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                videoContainer.classList.remove('touched');
            }, 3000);
        });

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (videoContainer.requestFullscreen) videoContainer.requestFullscreen();
            else if (videoContainer.webkitRequestFullscreen) videoContainer.webkitRequestFullscreen();
        });

        // ========== CANALES ==========
        channelItems.forEach(item => {
            item.addEventListener('click', () => {
                const url = item.dataset.url;
                const name = item.dataset.name;

                // Actualizar UI
                channelItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');

                // Cargar
                loadChannel(url, name);
            });
        });

        // ========== CHROMECAST ==========
        window['__onGCastApiAvailable'] = function(isAvailable) {
            if (isAvailable) {
                initializeCastApi();
            }
        };

        function initializeCastApi() {
            cast.framework.CastContext.getInstance().setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });

            // Escuchar cambios de sesión
            cast.framework.CastContext.getInstance().addEventListener(
                cast.framework.CastContextEventType.SESSION_STATE_CHANGED,
                function(event) {
                    switch (event.sessionState) {
                        case cast.framework.SessionState.SESSION_STARTED:
                        case cast.framework.SessionState.SESSION_RESUMED:
                            castSession = cast.framework.CastContext.getInstance().getCurrentSession();
                            isCasting = true;
                            castBtn.classList.add('connected');

                            // Si hay un canal cargado, mandarlo al Cast
                            const activeChannel = document.querySelector('.channel-item.active');
                            if (activeChannel) {
                                loadMediaOnCast(activeChannel.dataset.url, activeChannel.dataset.name);
                            }
                            break;

                        case cast.framework.SessionState.SESSION_ENDED:
                            castSession = null;
                            isCasting = false;
                            castBtn.classList.remove('connected');

                            // Volver a reproducir localmente
                            const activeChannel = document.querySelector('.channel-item.active');
                            if (activeChannel) {
                                loadChannel(activeChannel.dataset.url, activeChannel.dataset.name);
                            }
                            break;
                    }
                }
            );
        }

        castBtn.addEventListener('click', () => {
            if (isCasting) {
                cast.framework.CastContext.getInstance().endCurrentSession(true);
            } else {
                cast.framework.CastContext.getInstance().requestSession();
            }
        });

        function loadMediaOnCast(url, name) {
            if (!castSession) return;

            const mediaInfo = new chrome.cast.media.MediaInfo(url, 'application/x-mpegURL');
            mediaInfo.metadata = new chrome.cast.media.TvShowMediaMetadata();
            mediaInfo.metadata.title = name || 'Repretel';
            mediaInfo.metadata.subtitle = 'En vivo';

            const request = new chrome.cast.media.LoadRequest(mediaInfo);
            request.autoplay = true;

            castSession.loadMedia(request).then(
                () => console.log('Cast: media cargada'),
                (errorCode) => console.error('Cast error:', errorCode)
            );
        }

        // ========== UTILIDADES ==========
        // Mantener pantalla encendida
        if ('wakeLock' in navigator) {
            let wakeLock = null;
            player.addEventListener('play', async () => {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
            });
            player.addEventListener('pause', () => {
                if (wakeLock) wakeLock.release();
            });
        }

        // Barra de progreso simulada (live no tiene duración real)
        setInterval(() => {
            if (isPlaying && player.duration) {
                const pct = (player.currentTime / player.duration) * 100;
                progressFill.style.width = pct + '%';
            }
        }, 1000);
    </script>
</body>
</html>
