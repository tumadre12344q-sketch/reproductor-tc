<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#1a1a2e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Repretel TV</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #f0f4ff;
  --card-shadow: 0 8px 32px rgba(0,0,0,.13);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
  width:100%;min-height:100vh;
  background:var(--bg);
  font-family:'Nunito',sans-serif;
  display:flex;flex-direction:column;
  align-items:center;
}

/* subtle background pattern */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(100,140,255,.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 90%, rgba(255,100,100,.1) 0%, transparent 60%);
  pointer-events:none;
}

/* ---- HEADER ---- */
.header{
  width:100%;padding:28px 24px 12px;
  text-align:center;
}

.tv-icon{font-size:3rem;display:block;margin-bottom:6px;}

.title{
  font-size:2rem;font-weight:900;
  color:#1a1a2e;letter-spacing:-.5px;
}

.subtitle{
  font-size:1.05rem;color:#888;
  margin-top:4px;font-weight:700;
}

/* ---- INSTRUCTIONS ---- */
.instructions{
  margin:16px 20px;
  padding:16px 20px;
  background:white;
  border-radius:20px;
  box-shadow:var(--card-shadow);
  color:#555;
  font-size:1rem;
  font-weight:700;
  line-height:1.6;
  text-align:center;
  max-width:400px;
  width:calc(100% - 40px);
}
.instructions strong{color:#1a1a2e;}

/* ---- CHANNELS ---- */
.channels{
  width:100%;max-width:420px;
  padding:8px 20px 40px;
  display:flex;flex-direction:column;gap:18px;
}

.channel-btn{
  width:100%;border:none;cursor:pointer;
  border-radius:28px;
  padding:0;
  box-shadow:var(--card-shadow);
  transition:transform .12s, box-shadow .12s;
  overflow:hidden;
  position:relative;
  -webkit-tap-highlight-color:transparent;
}

.channel-btn:active{
  transform:scale(.96);
  box-shadow:0 4px 16px rgba(0,0,0,.15);
}

.channel-inner{
  display:flex;align-items:center;
  padding:22px 24px;
  gap:20px;
}

/* Canal 6 */
.ch6 .channel-inner{background:linear-gradient(135deg,#ff4757 0%,#ff6b35 100%);}
/* Canal 11 */
.ch11 .channel-inner{background:linear-gradient(135deg,#f9a825 0%,#ff7043 100%);}
/* Canal 4 */
.ch4 .channel-inner{background:linear-gradient(135deg,#26c6da 0%,#1565c0 100%);}

.ch-number{
  width:72px;height:72px;
  border-radius:20px;
  background:rgba(255,255,255,.22);
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;font-weight:900;
  color:white;flex-shrink:0;
  text-shadow:0 2px 8px rgba(0,0,0,.2);
}

.ch-text{flex:1;text-align:left;}
.ch-name{
  font-size:1.6rem;font-weight:900;
  color:white;
  text-shadow:0 2px 8px rgba(0,0,0,.15);
  line-height:1.1;
}
.ch-desc{
  font-size:1rem;font-weight:700;
  color:rgba(255,255,255,.75);
  margin-top:4px;
}

.ch-arrow{
  font-size:2rem;
  color:rgba(255,255,255,.6);
  font-weight:900;
}

/* ---- TOAST ---- */
.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1a1a2e;color:white;
  padding:14px 28px;border-radius:999px;
  font-size:1rem;font-weight:700;
  white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.25);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  opacity:0;pointer-events:none;
  z-index:99;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ---- NOTE ---- */
.note{
  color:#aaa;font-size:.82rem;font-weight:700;
  text-align:center;padding:0 24px 32px;
  max-width:360px;line-height:1.6;
}
</style>
</head>
<body>

<div class="header">
  <span class="tv-icon">📺</span>
  <div class="title">Repretel TV</div>
  <div class="subtitle">Tocá el canal para ver en tu TV</div>
</div>

<div class="instructions">
  <strong>¿Cómo funciona?</strong><br>
  Tocá el canal que querés → se abre VLC → tocá el ícono 📡 de VLC para enviarlo al Chromecast
</div>

<div class="channels">

  <button class="channel-btn ch6" onclick="openChannel('https://alba-cr-repretel-c6.stream.mediatiquestream.com/index.m3u8','Canal 6')">
    <div class="channel-inner">
      <div class="ch-number">6</div>
      <div class="ch-text">
        <div class="ch-name">Canal 6</div>
        <div class="ch-desc">Noticias y deportes</div>
      </div>
      <div class="ch-arrow">›</div>
    </div>
  </button>

  <button class="channel-btn ch11" onclick="openChannel('https://alba-cr-repretel-c11.stream.mediatiquestream.com/index.m3u8','Canal 11')">
    <div class="channel-inner">
      <div class="ch-number">11</div>
      <div class="ch-text">
        <div class="ch-name">Canal 11</div>
        <div class="ch-desc">Series y películas</div>
      </div>
      <div class="ch-arrow">›</div>
    </div>
  </button>

  <button class="channel-btn ch4" onclick="openChannel('https://alba-cr-repretel-c4.stream.mediatiquestream.com/index.m3u8','Canal 4')">
    <div class="channel-inner">
      <div class="ch-number">4</div>
      <div class="ch-text">
        <div class="ch-name">Canal 4</div>
        <div class="ch-desc">Cultura y comunidad</div>
      </div>
      <div class="ch-arrow">›</div>
    </div>
  </button>

</div>

<div class="note">
  Necesitás tener VLC instalado.<br>
  Funciona con Chromecast en la misma red WiFi.
</div>

<div class="toast" id="toast">📺 Abriendo VLC...</div>

<script>
function openChannel(url, name){
  // Mostrar toast
  const toast = document.getElementById('toast');
  toast.textContent = '📺 Abriendo ' + name + ' en VLC...';
  toast.classList.add('show');
  setTimeout(()=>{ toast.classList.remove('show'); }, 2500);

  // Intentar abrir con VLC via deep link
  // vlc:// es el esquema que VLC registra en Android/iOS
  const vlcUrl = 'vlc://' + url.replace('https://','');

  // Intentar primero con intent de Android (más confiable)
  const intentUrl = 'intent://' + url.replace('https://','') +
    '#Intent;scheme=https;package=org.videolan.vlc;' +
    'S.title=' + encodeURIComponent(name) + ';end';

  // Detectar Android
  const isAndroid = /android/i.test(navigator.userAgent);
  const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);

  if(isAndroid){
    window.location.href = intentUrl;
  } else if(isIOS){
    window.location.href = vlcUrl;
  } else {
    // PC — abrir directo
    window.open(url, '_blank');
  }
}
</script>
</body>
</html>
